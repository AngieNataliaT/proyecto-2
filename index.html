<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://materialdesignicons.com/cdn/1.6.50-dev/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Social dog</title>
  </head>
  <body>
    <header class="contenido">
      <section class="cuadro">
        <div class="vertical-container">
          <div class="parte-principal">
            <img src="./imagenes/perro.jpg" alt="perrito" class="blanquito" />

            <div class="textos">
              <p class="text-container">Club Doggo</p>
              <p class="texto-intro">Sponsored .</p>
            </div>
          </div>
        </div>

        <div class="textos-2">
          <p class="text-input">Some default post text here...</p>
          <p>I have nothing to say but you need to buy it.</p>
        </div>

        <img src="./imagenes/Image.png" alt="perro" class="perrito" />
        <div class="zona-gris">
          <p class="headline">Headline</p>
          <button class="shop-now">Shop Now</button>
        </div>

        <div class="zona-reaccion">
          <div class="reaccion">
            <p>👍🏽</p>
            <p>129</p>
          </div>

          <div class="acciones">
            <p>12 Comments</p>
            <p>8 Shares</p>
          </div>
        </div>

        <div class="zona-interactiva">
          <div class="like">
            <i class="mdi-thumb-up"></i>
            <p>Like</p>
          </div>

          <div class="comment">
            <i class="mdi-comment-outline"></i>
            <p>Comment</p>
          </div>

          <div class="share">
            <i class="mdi-share"></i>
            <p>Share</p>
          </div>
        </div>
      </section>
    </header>
  </body>
</html>
